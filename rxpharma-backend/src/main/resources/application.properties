# Server
server.port=${PORT:8083}

# Database
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5435}/${PGDATABASE:rxpharma_db}
spring.datasource.username=${PGUSER:rxpharma_user}
spring.datasource.password=${PGPASSWORD:rxpharma_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:391385140157-h28t759ft80a25p4vgktdm6qo37q2p94.apps.googleusercontent.com}

server.error.include-message=always
server.error.include-binding-errors=always

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
