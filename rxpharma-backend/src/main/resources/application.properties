# Server
server.port=${PORT:8083}

# Database — Railway injects DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5435/rxpharma_db}
spring.datasource.username=${DB_USERNAME:rxpharma_user}
spring.datasource.password=${DB_PASSWORD:rxpharma_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID_HERE}

server.error.include-message=always
server.error.include-binding-errors=always