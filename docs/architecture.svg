<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #f7faf9; }
      .title { font-family: Arial, sans-serif; font-size: 40px; font-weight: 700; fill: #12312b; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #50615d; }
      .section { fill: #ffffff; stroke: #cbd8d4; stroke-width: 2; rx: 18; }
      .section-title { font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #183a34; }
      .box { fill: #eef7f5; stroke: #76a99d; stroke-width: 2; rx: 14; }
      .box2 { fill: #fff7e8; stroke: #d8aa50; stroke-width: 2; rx: 14; }
      .box3 { fill: #f2f0ff; stroke: #9387d8; stroke-width: 2; rx: 14; }
      .box4 { fill: #f8f1f4; stroke: #c98ba4; stroke-width: 2; rx: 14; }
      .box-title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #102822; }
      .box-text { font-family: Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #3f514d; }
      .small { font-family: Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #4c5f5a; }
      .arrow { stroke: #47645e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #849691; stroke-width: 2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#47645e" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="70" class="title">RxPharma Architecture</text>
  <text x="70" y="103" class="subtitle">Full-stack pharmacy management system: React client, secured Spring Boot API, PostgreSQL data store</text>

  <rect x="70" y="145" width="270" height="235" class="section"/>
  <text x="95" y="185" class="section-title">Client Layer</text>
  <rect x="105" y="215" width="200" height="115" class="box"/>
  <text x="135" y="258" class="box-title">React + Vite</text>
  <text x="135" y="287" class="box-text">Tailwind CSS</text>
  <text x="135" y="311" class="box-text">Axios / Router</text>
  <text x="106" y="355" class="small">Local dev: localhost:5173</text>

  <rect x="420" y="145" width="560" height="235" class="section"/>
  <text x="445" y="185" class="section-title">Backend Application</text>
  <rect x="455" y="215" width="150" height="110" class="box2"/>
  <text x="485" y="258" class="box-title">REST API</text>
  <text x="483" y="287" class="box-text">Controllers</text>
  <rect x="625" y="215" width="150" height="110" class="box3"/>
  <text x="657" y="250" class="box-title">Security</text>
  <text x="653" y="279" class="box-text">JWT Filter</text>
  <text x="655" y="303" class="box-text">RBAC</text>
  <rect x="795" y="215" width="150" height="110" class="box"/>
  <text x="828" y="258" class="box-title">Services</text>
  <text x="825" y="287" class="box-text">Business logic</text>
  <text x="538" y="355" class="small">Spring Boot 3.4.5 / Java 21 / localhost:8083</text>

  <rect x="1060" y="145" width="270" height="235" class="section"/>
  <text x="1085" y="185" class="section-title">Persistence Layer</text>
  <rect x="1095" y="215" width="200" height="115" class="box4"/>
  <text x="1128" y="258" class="box-title">PostgreSQL</text>
  <text x="1128" y="287" class="box-text">JPA repositories</text>
  <text x="1128" y="311" class="box-text">Flyway migrations</text>
  <text x="1096" y="355" class="small">Docker: localhost:5435</text>

  <path d="M 340 263 L 420 263" class="arrow"/>
  <path d="M 605 270 L 625 270" class="arrow"/>
  <path d="M 775 270 L 795 270" class="arrow"/>
  <path d="M 945 270 L 1060 270" class="arrow"/>

  <rect x="70" y="450" width="1260" height="335" class="section"/>
  <text x="95" y="492" class="section-title">Domain Modules</text>

  <rect x="105" y="530" width="180" height="90" class="box"/>
  <text x="145" y="568" class="box-title">Users</text>
  <text x="130" y="595" class="box-text">Roles and accounts</text>

  <rect x="315" y="530" width="180" height="90" class="box"/>
  <text x="362" y="568" class="box-title">Drugs</text>
  <text x="341" y="595" class="box-text">Inventory and alerts</text>

  <rect x="525" y="530" width="180" height="90" class="box"/>
  <text x="560" y="568" class="box-title">Suppliers</text>
  <text x="554" y="595" class="box-text">Vendor records</text>

  <rect x="735" y="530" width="180" height="90" class="box"/>
  <text x="765" y="568" class="box-title">Prescriptions</text>
  <text x="766" y="595" class="box-text">Dispense workflow</text>

  <rect x="945" y="530" width="180" height="90" class="box"/>
  <text x="1000" y="568" class="box-title">Sales</text>
  <text x="975" y="595" class="box-text">Items and invoices</text>

  <rect x="1155" y="530" width="140" height="90" class="box"/>
  <text x="1183" y="568" class="box-title">Orders</text>
  <text x="1180" y="595" class="box-text">Purchasing</text>

  <rect x="300" y="670" width="270" height="80" class="box2"/>
  <text x="350" y="705" class="box-title">Dashboard</text>
  <text x="335" y="731" class="box-text">Operational statistics and alerts</text>

  <rect x="605" y="670" width="390" height="80" class="box3"/>
  <text x="700" y="705" class="box-title">Cross-cutting Concerns</text>
  <text x="665" y="731" class="box-text">Validation, DTOs, exceptions, BCrypt, JWT</text>

  <path d="M 700 380 L 700 450" class="dash"/>
  <path d="M 700 365 C 700 415 195 405 195 530" class="dash"/>
  <path d="M 700 365 C 700 415 1035 405 1035 530" class="dash"/>

  <text x="70" y="840" class="small">Primary roles: ADMIN, PHARMACIST, CASHIER, SUPPLIER_MANAGER</text>
</svg>
